name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: pemira-26
  REGION: asia-southeast1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_mysql, gd, zip, bcmath
          coverage: none

      - name: Create framework directories
        run: mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/pemira-26/$SERVICE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/pemira-26/$SERVICE_NAME:${{ github.sha }}"

          # Mencegah error parsing 'Bad syntax for dict arg' akibat JSON Kredensial GCS
          jq -n '{
            "APP_ENV": "production",
            "APP_DEBUG": "false",
            "APP_KEY": env.APP_KEY,
            "FILESYSTEM_DISK": "gcs",
            "GOOGLE_CLOUD_PROJECT_ID": env.GCP_PROJECT_ID,
            "GOOGLE_CLOUD_CREDENTIALS": env.GCP_SA_KEY,
            "GOOGLE_CLOUD_STORAGE_BUCKET": env.GCS_BUCKET,
            "GOOGLE_CLOUD_STORAGE_PATH_PREFIX": "pemira",
            "DB_CONNECTION": "mysql",
            "DB_HOST": env.DB_HOST,
            "DB_PORT": "3306",
            "DB_DATABASE": env.DB_DATABASE,
            "DB_USERNAME": env.DB_USERNAME,
            "DB_PASSWORD": env.DB_PASSWORD,
            "SESSION_DRIVER": "redis",
            "SESSION_CONNECTION": "default",
            "SESSION_SECURE_COOKIE": "true",
            "SESSION_SAME_SITE": "lax",
            "CACHE_STORE": "redis",
            "QUEUE_CONNECTION": "redis",
            "REDIS_CLIENT": "predis",
            "REDIS_URL": env.REDIS_URL
          }' > env_vars.yaml

          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --env-vars-file env_vars.yaml

      - name: Update APP_URL with deployed URL
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')
          echo "Service URL: $SERVICE_URL"
          gcloud run services update $SERVICE_NAME \
            --region $REGION \
            --update-env-vars "APP_URL=$SERVICE_URL,ASSET_URL=$SERVICE_URL"

      - name: Show deployment URL
        run: |
          echo "🚀 Application deployed to:"
          gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)'
